[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "php84Extensions.pgsql", "php84Extensions.pdo_pgsql", "nodejs_22", "npm"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm install",
    "npm run build"
]

# During build, Laravel must NOT touch the database.
# These env vars override Railway Variables for the build phase only.
[phases.build.variables]
CACHE_STORE = "array"
SESSION_DRIVER = "array"
QUEUE_CONNECTION = "sync"
DB_CONNECTION = "sqlite"

[start]
cmd = "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
