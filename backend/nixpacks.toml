[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "php84Extensions.pgsql", "php84Extensions.pdo_pgsql", "nodejs_22"]

[phases.install]
cmds = [
  "composer install --no-interaction --optimize-autoloader",
  "npm install"
]

[phases.build]
cmds = [
  "composer install --no-dev --no-interaction --optimize-autoloader",
  "npm install",
  "npm run build"
]

# During install and build, Laravel must not touch the database.
[phases.install.variables]
CACHE_STORE = "array"
SESSION_DRIVER = "array"
QUEUE_CONNECTION = "sync"
DB_CONNECTION = "sqlite"
APP_KEY = "base64:dummy_for_build"
JWT_SECRET = "dummy_jwt_secret_for_build"

[phases.build.variables]
CACHE_STORE = "array"
SESSION_DRIVER = "array"
QUEUE_CONNECTION = "sync"
DB_CONNECTION = "sqlite"
APP_KEY = "base64:dummy_for_build"
JWT_SECRET = "dummy_jwt_secret_for_build"

[start]
cmd = "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
